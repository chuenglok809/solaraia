[build]
  publish = "."

# Custom 404
[build.processing]
  skip_processing = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

# SEO redirects
[[redirects]]
  from = "/sitemap"
  to = "/sitemap.xml"
  status = 301

[[redirects]]
  from = "/produtos"
  to = "/#produtos"
  status = 302

[[redirects]]
  from = "/instalacao"
  to = "/#instalacao"
  status = 302

# Trailing slash normalization
[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/sobre"
  to = "/sobre/"
  status = 301

[[redirects]]
  from = "/contato"
  to = "/contato/"
  status = 301

[[redirects]]
  from = "/termos"
  to = "/termos/"
  status = 301

[[redirects]]
  from = "/privacidade"
  to = "/privacidade/"
  status = 301
